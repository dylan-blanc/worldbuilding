map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name _;

  # Empache l'acces aux dotfiles (.env, .git, etc.) et redirige vers l'accueil
  # on exclut aussi ".vite" car Vite sert des modules via /node_modules/.vite/ en dev
  location ~ (^|/)\.(?!well-known)(?!vite).* {
    # $host renvoi vers le localhost du client et pas du container, $http_host force le localhost en http et non en https
    return 302 http://$http_host/;
  }

  location ^~ /api/ {
    proxy_pass http://backend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy vers Vite (hot reload)
  location / {
    proxy_pass http://frontend:5173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
  }

  server_tokens off;
}
