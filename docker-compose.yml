services:
  backend:
    build:
      context: ./backend
      target: dev
    env_file:
      - ./.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_REGION: "us-east-1"
      MINIO_BUCKET: "${BUCKET}"
      MINIO_ACCESS_KEY: "${minio_access_key}"
      MINIO_SECRET_KEY: "${minio_secret_key}"
      MINIO_PATH_STYLE: "true"
    volumes:
      - ./backend:/var/www/html
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents(\"http://127.0.0.1/api\") === false ? 1 : 0);"]
      interval: "10s"
      timeout: "5s"
      retries: 5
      start_period: "20s"
    depends_on:
      - db
      - minio

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NUXT_PUBLIC_API_BASE: /api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    expose:
      - "5173"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:5173/"]
      interval: "5s"
      timeout: "3s"
      retries: 10
      start_period: "10s"
    depends_on:
      backend:
        condition: "service_healthy"

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/db/db.sql:/docker-entrypoint-initdb.d/01-db.sql:ro
    expose:
      - "3306"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./SSL:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: "service_healthy"
      backend:
        condition: "service_healthy"

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin:5.2-apache
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "127.0.0.1:${PHPMYADMIN_PROD_PORT}:80"
    depends_on:
      - db
    restart: unless-stopped

  minio:
    container_name: "minio"
    image: "pgsty/minio:RELEASE.2026-06-18T00-00-00Z"
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    restart: "unless-stopped"

  # Used to generate mock data in MinIO for development purposes
  # This service runs once and exits after initializing the bucket and uploading a test file
  minio-init:
    image: "pgsty/mc:RELEASE.2026-04-17T00-00-00Z"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" --api S3v4 --path on; do
          sleep 2
        done
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
        mc cp "/mock-data/01/test.txt" "local/$${MINIO_BUCKET}/01/test.txt"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
      MINIO_BUCKET: "${BUCKET}"
    volumes:
      - ./docker/minio/mock-data:/mock-data:ro
    depends_on:
      - minio
    restart: "no"

volumes:
  db_data:
  frontend_node_modules:
  minio_data:
