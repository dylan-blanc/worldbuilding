services:
  backend:
    build:
      context: ./backend
      target: dev
    env_file:
      - ./.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./backend:/var/www/html
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "php", "-r", "require \"/var/www/html/config/database.php\";"]
      interval: "10s"
      timeout: "5s"
      retries: 5
      start_period: "20s"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NUXT_PUBLIC_API_BASE: /api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    expose:
      - "5173"
    depends_on:
      - backend

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/db/db.sql:/docker-entrypoint-initdb.d/01-db.sql:ro
    expose:
      - "3306"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./SSL:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
  
  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin:5.2-apache
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "127.0.0.1:${PHPMYADMIN_PROD_PORT}:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:
  frontend_node_modules:
