services:
  backend:
    build:
      context: ./backend
      target: dev
    env_file:
      - ./.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-worldbuilding}
      DB_USER: ${MYSQL_USER:-wbadmin}
      DB_PASSWORD: ${MYSQL_PASSWORD:-wbpassword}
    volumes:
      - ./backend:/var/www/html
    expose:
      - "80"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NUXT_PUBLIC_API_BASE: /api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    expose:
      - "5173"
    depends_on:
      - backend

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-worldbuilding}
      MYSQL_USER: ${MYSQL_USER:-wbadmin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wbpassword}
    volumes:
      - db_data:/var/lib/mysql
    expose:
      - "3306"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./SSL:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
  frontend_node_modules:
