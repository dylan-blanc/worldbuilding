services:
  backend:
    container_name: backend
    build:
      context: ./backend
      target: prod
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-worldbuilding}
      DB_USER_FILE: /run/secrets/mysql_user
      DB_PASSWORD_FILE: /run/secrets/mysql_password
      FRONTEND_URL: ${PROD_FRONTEND_URL}
      API_TOKEN_FILE: /run/secrets/api_token
      JWT_TOKEN_FILE: /run/secrets/jwt_token
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
    depends_on:
      - db
    secrets:
      - api_token
      - jwt_token
      - mysql_user
      - mysql_password
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "php", "-r", "require \"/var/www/html/config/database.php\";"]
      interval: "10s"
      timeout: "5s"
      retries: 5
      start_period: "20s"
    restart: unless-stopped

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      target: prod
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    container_name: nginx
    image: nginx:1.30-alpine
    ports:
      - "${PROD_WEB_PORT:-80}:80"
      - "${PROD_WEB_SSL_PORT:-443}:443"
    volumes:
      - ./frontend/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  db:
    container_name: db
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: ${MYSQL_DATABASE:-worldbuilding}
      MYSQL_USER_FILE: /run/secrets/mysql_user
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
    secrets:
      - mysql_root_password
      - mysql_user
      - mysql_password
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/db/db.sql:/docker-entrypoint-initdb.d/01-db.sql:ro
    restart: unless-stopped

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin:5.2-apache
    profiles:
      - "admin"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "127.0.0.1:${PHPMYADMIN_PROD_PORT}:80"
    depends_on:
      - db
    restart: unless-stopped
    # pour lancer le service phpmyadmin en prod, accessible sur http://localhost:8081
    # docker compose -f docker-compose.prod.yml --profile admin up -d phpmyadmin

    # pour l'arreter :
    # docker compose -f docker-compose.prod.yml stop phpmyadmin


volumes:
  db_data:

secrets:
  api_token:
    file: ./secrets/api_token
  jwt_token:
    file: ./secrets/jwt_token
  mysql_root_password:
    file: ./secrets/mysql_root_password
  mysql_user:
    file: ./secrets/mysql_user
  mysql_password:
    file: ./secrets/mysql_password
