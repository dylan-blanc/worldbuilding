# Orchestrates production services with file-backed Docker secrets and persistent data.
# MinIO remains internal to the application network while its console is bound to localhost.
services:
  backend:
    container_name: backend
    build:
      context: ./backend
      target: prod
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-worldbuilding}
      DB_USER_FILE: /run/secrets/mysql_user
      DB_PASSWORD_FILE: /run/secrets/mysql_password
      FRONTEND_URL: ${PROD_FRONTEND_URL}
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_REGION: "us-east-1"
      MINIO_BUCKET: "${BUCKET}"
      MINIO_ACCESS_KEY_FILE: /run/secrets/minio_access_key
      MINIO_SECRET_KEY_FILE: /run/secrets/minio_secret_key
      MINIO_PATH_STYLE: "true"
    depends_on:
      - db
      - minio
    secrets:
      - mysql_user
      - mysql_password
      - minio_access_key
      - minio_secret_key
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents(\"http://127.0.0.1/api\") === false ? 1 : 0);"]
      interval: "10s"
      timeout: "5s"
      retries: 5
      start_period: "20s"
    restart: unless-stopped

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      target: prod
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: "5s"
      timeout: "3s"
      retries: 10
      start_period: "10s"
    depends_on:
      backend:
        condition: "service_healthy"
    restart: unless-stopped

  nginx:
    container_name: nginx
    image: nginx:1.30-alpine
    ports:
      - "${PROD_WEB_PORT:-80}:80"
      - "${PROD_WEB_SSL_PORT:-443}:443"
    volumes:
      - ./frontend/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: "service_healthy"
      backend:
        condition: "service_healthy"
    restart: unless-stopped

  db:
    container_name: db
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: ${MYSQL_DATABASE:-worldbuilding}
      MYSQL_USER_FILE: /run/secrets/mysql_user
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
    secrets:
      - mysql_root_password
      - mysql_user
      - mysql_password
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/db/db.sql:/docker-entrypoint-initdb.d/01-db.sql:ro
    restart: unless-stopped

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin:5.2-apache
    profiles:
      - "admin"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "127.0.0.1:${PHPMYADMIN_PROD_PORT}:80"
    depends_on:
      - db
    restart: unless-stopped
    # pour lancer le service phpmyadmin en prod, accessible sur http://localhost:8081
    # docker compose -f docker-compose.prod.yml --profile admin up -d phpmyadmin

    # pour l'arreter :
    # docker compose -f docker-compose.prod.yml stop phpmyadmin

  minio:
    container_name: "minio"
    image: "pgsty/minio:RELEASE.2026-06-18T00-00-00Z"
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER_FILE: "/run/secrets/minio_root_user"
      MINIO_ROOT_PASSWORD_FILE: "/run/secrets/minio_root_password"
    secrets:
      - minio_root_user
      - minio_root_password
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    ports:
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    restart: "unless-stopped"


volumes:
  db_data:
  minio_data:

secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password
  mysql_user:
    file: ./secrets/mysql_user
  mysql_password:
    file: ./secrets/mysql_password
  minio_root_user:
    file: ./secrets/minio_root_user
  minio_root_password:
    file: ./secrets/minio_root_password
  minio_access_key:
    file: ./secrets/minio_access_key
  minio_secret_key:
    file: ./secrets/minio_secret_key
